<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video dan Lokasi</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 20px;
}

.container {
background: white;
border-radius: 20px;
box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
padding: 40px;
max-width: 600px;
width: 100%;
animation: slideUp 0.5s ease-out;
}

@keyframes slideUp {
from {
opacity: 0;
transform: translateY(30px);
}
to {
opacity: 1;
transform: translateY(0);
}
}

h2 {
color: #333;
margin-bottom: 30px;
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
font-size: 28px;
}

h2 i {
color: #667eea;
}

video {
max-width: 100%;
border-radius: 15px;
box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
margin-bottom: 30px;
display: block;
background: #f0f0f0;
}

.button-container {
margin: 30px 0;
display: none;
}

button {
width: 100%;
padding: 15px 20px;
font-size: 16px;
font-weight: 600;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
color: white;
border: none;
border-radius: 10px;
cursor: pointer;
transition: all 0.3s ease;
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
}

button:hover {
transform: translateY(-2px);
box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
}

button:active {
transform: translateY(0);
}

button i {
margin-right: 5px;
}

#hasil {
margin-top: 30px;
padding: 20px;
background: #f8f9fa;
border-radius: 10px;
font-size: 16px;
color: #333;
border-left: 5px solid #667eea;
min-height: 20px;
animation: fadeIn 0.3s ease-out;
}

#hasil.success {
background: #d4edda;
border-left-color: #28a745;
color: #155724;
}

#hasil.error {
background: #f8d7da;
border-left-color: #dc3545;
color: #721c24;
}

#hasil.loading {
background: #d1ecf1;
border-left-color: #17a2b8;
color: #0c5460;
}

@keyframes fadeIn {
from {
opacity: 0;
}
to {
opacity: 1;
}
}

.lokasi-info {
text-align: center;
}

.lokasi-info strong {
display: block;
margin-bottom: 10px;
font-size: 18px;
}

.coords {
font-family: 'Courier New', monospace;
background: white;
padding: 10px;
border-radius: 5px;
margin: 10px 0;
font-size: 14px;
}

.maps-link {
display: inline-block;
margin-top: 15px;
padding: 10px 20px;
background: #28a745;
color: white;
text-decoration: none;
border-radius: 5px;
transition: background 0.3s;
}

.maps-link:hover {
background: #218838;
}

.spinner {
display: inline-block;
width: 4px;
height: 4px;
border-radius: 50%;
background: #667eea;
margin: 0 2px;
animation: spin 0.6s infinite;
}

.spinner:nth-child(2) {
animation-delay: 0.1s;
}

.spinner:nth-child(3) {
animation-delay: 0.2s;
}

@keyframes spin {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-10px); }
}
</style>
</head>
<body>

<div class="container">
<h2><i class="fas fa-video"></i> Video dan Lokasi</h2>

<video controls>
<source src="video.mp4" type="video/mp4">
Browser Anda tidak mendukung video.
</video>

<div class="button-container">
<button onclick="ambilLokasi()"><i class="fas fa-map-marker-alt"></i> Ambil Lokasi Saya</button>
</div>

<div id="hasil"></div>

<script>
function ambilLokasi() {
const hasil = document.getElementById("hasil");

hasil.className = "loading";
hasil.innerHTML = 'Meminta izin lokasi <span class="spinner"></span><span class="spinner"></span><span class="spinner"></span>';

if (navigator.geolocation) {
navigator.geolocation.getCurrentPosition(
function(posisi) {
const lat = posisi.coords.latitude;
const lon = posisi.coords.longitude;
const accuracy = posisi.coords.accuracy.toFixed(0);

hasil.className = "success";
hasil.innerHTML = `
<div class="lokasi-info">
<strong><i class="fas fa-check-circle"></i> Lokasi Berhasil Diperoleh!</strong>
<div class="coords">
<strong>Latitude:</strong> ${lat.toFixed(6)}<br>
<strong>Longitude:</strong> ${lon.toFixed(6)}<br>
<strong>Akurasi:</strong> ±${accuracy} meter
</div>
<a href="https://maps.google.com/?q=${lat},${lon}" target="_blank" class="maps-link">
<i class="fas fa-map"></i> Buka di Google Maps
</a>
</div>
`;
},
function(error) {
ambilLokasiDariIP();
}
);
} else {
ambilLokasiDariIP();
}
}

function ambilLokasiDariIP() {
const hasil = document.getElementById("hasil");

fetch('https://ipapi.co/json/')
.then(response => response.json())
.then(data => {
const lat = data.latitude;
const lon = data.longitude;
const city = data.city;
const country = data.country_name;

hasil.className = "success";
hasil.innerHTML = `
<div class="lokasi-info">
<strong><i class="fas fa-check-circle"></i> Lokasi Berhasil Diperoleh!</strong>
<div class="coords">
<strong>Latitude:</strong> ${lat.toFixed(6)}<br>
<strong>Longitude:</strong> ${lon.toFixed(6)}<br>
<strong>Lokasi:</strong> ${city}, ${country}<br>
<strong>Metode:</strong> IP Geolocation
</div>
<a href="https://maps.google.com/?q=${lat},${lon}" target="_blank" class="maps-link">
<i class="fas fa-map"></i> Buka di Google Maps
</a>
</div>
`;
})
.catch(err => {
hasil.className = "error";
hasil.innerHTML = '<i class="fas fa-circle-exclamation"></i> Tidak dapat mengambil lokasi. Silakan coba lagi.';
});
}

window.addEventListener('load', function() {
setTimeout(ambilLokasi, 500);
});
</script>

</body>
</html>
